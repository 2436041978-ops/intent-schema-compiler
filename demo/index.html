<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>约束显化：从 YAML 协议到机器安检</title>
<style>
:root{
  --bg:#f0f2f5;
  --card:#fff;
  --border:#d0d7de;
  --text:#1f2328;
  --text2:#656d76;
  --red:#cf222e;
  --orange:#bc4c00;
  --green:#1a7f37;
  --blue:#0969da;
  --radius:6px;
  --mono: ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;display:flex;flex-direction:column}

/* 顶部栏 - 固定高度 */
.topbar{flex:none;height:56px;padding:0 16px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.topbar h1{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}
.topbar .sub{font-size:11px;color:var(--text2);margin-top:2px}
.topbar .right{display:flex;align-items:center;gap:8px}
#scenario{padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;background:#fff;cursor:pointer;max-width:260px}
.btn-reset{padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius);background:#f6f8fa;font-size:12px;cursor:pointer;transition:.15s}
.btn-reset:hover{background:#eff1f3;border-color:#afb8c1}
.btn-reset:active{transform:scale(.95)}

/* 五栏主区域 - 填满剩余视口 */
.pipeline{flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:8px;min-height:0;overflow:hidden}
@media(max-width:1400px){.pipeline{grid-template-columns:repeat(3,1fr);overflow-y:auto}}
@media(max-width:900px){.pipeline{grid-template-columns:1fr}}

.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden;min-width:0}
.panel-header{flex:none;height:36px;padding:0 10px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px;background:#f6f8fa}
.panel-body{flex:1;padding:10px;overflow:auto;font-size:11px;font-family:var(--mono);line-height:1.5;min-height:0}
.panel-body pre{margin:0;white-space:pre-wrap;word-break:break-word}

/* 代码高亮 */
.yaml .k{color:var(--blue);font-weight:600}
.yaml .s{color:var(--red)}
.yaml .n{color:var(--orange)}
.yaml .c{color:var(--text2);font-style:italic}
.yaml .t{color:var(--green);font-weight:600}
.yaml .h{background:#ffebe9;border-radius:2px;padding:0 2px}
.json .k{color:var(--blue)}
.json .s{color:var(--red)}
.json .n{color:var(--orange)}
.json .b{color:var(--green)}

/* 推演 - 带动画 */
.tier-list{display:flex;flex-direction:column;gap:4px}
.tier-item{display:flex;align-items:flex-start;padding:6px 8px;border-radius:4px;border-left:3px solid #ddd;background:#fafafa;opacity:0;transform:translateX(-10px);animation:slideIn .35s forwards}
.tier-item:nth-child(1){animation-delay:.08s}
.tier-item:nth-child(2){animation-delay:.18s}
.tier-item:nth-child(3){animation-delay:.28s}
.tier-item:nth-child(4){animation-delay:.38s}
@keyframes slideIn{to{opacity:1;transform:translateX(0)}}

.tier-item.pass{border-left-color:var(--green);background:#f6fff8}
.tier-item.block{border-left-color:var(--red);background:#fff8f8}
.tier-item.warn{border-left-color:var(--orange);background:#fffaf5}
.tier-item.skip{opacity:.5;animation:none;transform:none}
.tier-icon{width:16px;text-align:center;margin-right:6px;font-size:12px;flex:none}
.tier-name{font-size:11px;font-weight:600}
.tier-desc{font-size:10px;color:var(--text2);margin-top:1px;line-height:1.4}

.verdict{flex:none;text-align:center;padding:8px;margin:8px 10px 10px;border-radius:4px;font-weight:700;font-size:12px;opacity:0;animation:fadeIn .4s .5s forwards}
@keyframes fadeIn{to{opacity:1}}
.verdict.pass{background:#dafbe1;color:var(--green);border:1px solid var(--green)}
.verdict.block{background:#ffebe9;color:var(--red);border:1px solid var(--red)}

/* 告警卡片 - 紧凑 */
.alert-card{border-radius:var(--radius);padding:12px;transition:all .3s ease}
.alert-card.critical{background:#ffebe9;border:1px solid var(--red);box-shadow:0 0 12px rgba(207,34,46,.12)}
.alert-card.warning{background:#fff8e1;border:1px solid var(--orange)}
.alert-card.normal{background:#dafbe1;border:1px solid var(--green)}
.alert-header{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.badge{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;color:#fff;line-height:1.4}
.badge.p0{background:var(--red)}
.badge.p1{background:var(--orange)}
.badge.severe{background:#9a6700;color:#fff}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(207,34,46,.6)}70%{box-shadow:0 0 0 6px rgba(207,34,46,0)}100%{box-shadow:0 0 0 0 rgba(207,34,46,0)}}
.title{font-size:14px;font-weight:700;margin-bottom:4px}
.cause{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.5}
.meta{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-bottom:4px}
.cbar{width:100%;height:4px;background:#eaeef2;border-radius:2px;overflow:hidden}
.cfill{height:100%;border-radius:2px;transition:width .8s ease .2s;width:0%}
.cfill.high{background:var(--green)}
.cfill.medium{background:var(--orange)}
.cfill.low{background:var(--red)}

/* 拦截遮罩 - 动态 */
.overlay{position:absolute;inset:0;background:rgba(255,255,255,.96);display:flex;align-items:center;justify-content:center;border-radius:var(--radius);z-index:10;opacity:0;animation:overlayIn .3s forwards}
@keyframes overlayIn{to{opacity:1}}
.overlay.hidden{display:none}
.omodal{text-align:center;padding:20px;max-width:260px;transform:scale(.88);animation:modalPop .35s .08s forwards}
@keyframes modalPop{to{transform:scale(1)}}
.omodal h3{color:var(--red);font-size:16px;margin-bottom:8px}
.omodal p{font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.6}
.omodal .btn{background:var(--red);color:#fff;border:none;padding:6px 16px;border-radius:var(--radius);cursor:pointer;font-size:12px}
.omodal .btn:hover{background:#a40e26}

.render-wrap{position:relative;height:100%;display:flex;flex-direction:column}

/* 空白占位状态 */
.placeholder-state{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:12px;font-family:var(--mono);text-align:center;padding:20px}
.placeholder-state .icon{font-size:24px;margin-bottom:8px;display:block}

/* 底部 */
.bottombar{flex:none;height:32px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);border-top:1px solid var(--border);background:var(--card);gap:12px}
.bottombar a{color:var(--blue);text-decoration:none}

/* 滚动条 */
.panel-body::-webkit-scrollbar{width:5px}
.panel-body::-webkit-scrollbar-thumb{background:#d0d7de;border-radius:3px}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <h1>🔒 约束显化：从 YAML 协议到机器安检</h1>
    <div class="sub">intent-schema-compiler → JSON Schema → Four-Tier Validator</div>
  </div>
  <div class="right">
    <select id="scenario">
      <option value="" selected>👆 选择输出场景</option>
      <option value="valid">✅ 合法输出</option>
      <option value="synonym">❌ 同义词漂移</option>
      <option value="length">❌ 文案过短</option>
      <option value="confidence">❌ 置信度越界</option>
      <option value="safety">❌ 安全违规</option>
      <option value="multi">❌ 复合违规</option>
    </select>
    <button class="btn-reset" onclick="reset()">↺ 重置</button>
  </div>
</div>

<div class="pipeline">
  <div class="panel">
    <div class="panel-header">📄 YAML 协议</div>
    <div class="panel-body yaml" id="yaml-panel">
      <div class="placeholder-state">
        <div>
          <span class="icon">📋</span>
          <div>选择场景后加载 YAML 协议</div>
        </div>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">⚙️ JSON Schema</div>
    <div class="panel-body json" id="schema-panel">
      <div class="placeholder-state">
        <div>
          <span class="icon">📐</span>
          <div>选择场景后加载 JSON Schema</div>
        </div>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">🤖 LLM 输出</div>
    <div class="panel-body json" id="json-panel">
      <div class="placeholder-state">
        <div>
          <span class="icon">🤖</span>
          <div>选择场景后加载 LLM 输出</div>
        </div>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">🛡️ 四层推演</div>
    <div class="panel-body" style="padding:8px;display:flex;flex-direction:column">
      <div class="tier-list" id="tier-panel">
        <div class="placeholder-state">
          <div>
            <span class="icon">🛡️</span>
            <div>选择场景后执行四层推演</div>
          </div>
        </div>
      </div>
      <div id="verdict-panel"></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">🖥️ 界面渲染</div>
    <div class="panel-body render-wrap">
      <div id="alert-card" style="opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s">
        <div class="placeholder-state">
          <div>
            <span class="icon">🖥️</span>
            <div>选择场景后渲染界面结果</div>
          </div>
        </div>
      </div>
      <div id="block-overlay" class="overlay hidden">
        <div class="omodal">
          <h3>🚫 意图协议拦截</h3>
          <p id="block-reason"></p>
          <button class="btn" onclick="reset()">重置演示</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="bottombar">
  <a href="https://github.com/2436041978-ops/intent-schema-compiler" target="_blank">intent-schema-compiler</a>
  <a href="https://github.com/2436041978-ops/schema-as-code" target="_blank">schema-as-code</a>
</div>

<script>
const yamlSources = {
  valid: `<span class="k">semantic_tokens</span>:
  <span class="t">status.critical</span>:
    <span class="k">canonical_id</span>: <span class="s">"ST-001"</span>
    <span class="k">immutable</span>: <span class="n">true</span>
    <span class="k">llm_constraints</span>:
      - <span class="s">"生成内容必须包含故障定位"</span>
      - <span class="s">"禁止提供未经验证的修复建议"</span>
    <span class="k">synonym_firewall</span>:
      <span class="k">prohibited</span>:
        - <span class="k">term</span>: <span class="s">"严重"</span>
          <span class="k">standard_token</span>: <span class="t">critical</span>

<span class="k">response_schema</span>:
  <span class="k">required</span>: [<span class="s">alert_level</span>, <span class="s">root_cause</span>, <span class="s">confidence_score</span>]
  <span class="k">properties</span>:
    <span class="k">alert_level</span>:
      <span class="k">enum</span>: [<span class="s">"P0"</span>, <span class="s">"P1"</span>, <span class="s">"P2"</span>, <span class="s">"P3"</span>]
    <span class="k">root_cause</span>:
      <span class="k">minLength</span>: <span class="n">10</span>
    <span class="k">confidence_score</span>:

<span class="k">human_ai_boundary</span>:

  synonym: `<span class="k">semantic_tokens</span>:
  <span class="t">status.critical</span>:
    <span class="k">canonical_id</span>: <span class="s">"ST-001"</span>
    <span class="k">immutable</span>: <span class="n">true</span>
    <span class="k">llm_constraints</span>:
      - <span class="s">"生成内容必须包含故障定位"</span>
    <span class="k">synonym_firewall</span>:
      <span class="k">prohibited</span>:
        - <span class="k">term</span>: <span class="s h">"严重"</span>  <span class="c">← 命中</span>
          <span class="k">standard_token</span>: <span class="t">critical</span>

<span class="k">response_schema</span>:
  <span class="k">properties</span>:
    <span class="k">alert_level</span>:
      <span class="k">enum</span>: [<span class="s">"P0"</span>..<<span class="s">"P3"</span>]  <span class="c">← "严重" 越界</span>
    <span class="k">root_cause</span>:
      <span class="k">minLength</span>: <span class="n">10</span>
    <span class="k">confidence_score</span>:
      <span class="k">maximum</span>: <span class="n">1.0</span>`,

  length: `<span class="k">semantic_tokens</span>:
  <span class="t">status.critical</span>:
    <span class="k">canonical_id</span>: <span class="s">"ST-001"</span>

<span class="k">response_schema</span>:
  <span class="k">properties</span>:
    <span class="k">alert_level</span>:
      <span class="k">enum</span>: [<span class="s">"P0"</span>..<<span class="s">"P3"</span>]
    <span class="k">root_cause</span>:
      <span class="k">minLength</span>: <span class="n h">10</span>  <span class="c">← "CPU" 不足</span>
    <span class="k">confidence_score</span>:
      <span class="k">maximum</span>: <span class="n">1.0</span>`,

  confidence: `<span class="k">semantic_tokens</span>:
  <span class="t">status.critical</span>:
    <span class="k">canonical_id</span>: <span class="s">"ST-001"</span>

<span class="k">response_schema</span>:
  <span class="k">properties</span>:
    <span class="k">alert_level</span>:
      <span class="k">enum</span>: [<span class="s">"P0"</span>..<<span class="s">"P3"</span>]
    <span class="k">root_cause</span>:
      <span class="k">minLength</span>: <span class="n">10</span>
    <span class="k">confidence_score</span>:
      <span class="k">maximum</span>: <span class="n h">1.0</span>  <span class="c">← 1.5 越界</span>`,

  safety: `<span class="k">semantic_tokens</span>:
  <span class="t">status.critical</span>:
    <span class="k">canonical_id</span>: <span class="s">"ST-001"</span>

<span class="k">response_schema</span>:

    <span class="k">confidence_score</span>:

<span class="k">human_ai_boundary</span>:
  <span class="k">ai_prohibited</span>:
    - <span class="s h">"直接执行修复操作"</span>  <span class="c">← 命中</span>
    - <span class="s">"修改告警阈值配置"</span>`,

  multi: `<span class="k">semantic_tokens</span>:
  <span class="t">status.critical</span>:
    <span class="k">canonical_id</span>: <span class="s">"ST-001"</span>
    <span class="k">synonym_firewall</span>:
      <span class="k">prohibited</span>:
        - <span class="k">term</span>: <span class="s h">"严重"</span>  <span class="c">← 命中</span>

<span class="k">response_schema</span>:

  type:"object",
  required:["alert_level","root_cause","confidence_score"],
  properties:{
    alert_level:{type:"string",enum:["P0","P1","P2","P3"]},

  multi:{data:{alert_level:"严重",root_cause:"CPU",confidence_score:1.5},pass:false,errors:[
    {tier:"semantic",name:"语义
