<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>约束显化：从 YAML 协议到机器安检</title>
<style>
:root{
  --bg:#f5f7fa;
  --card:#fff;
  --border:#e0e6ed;
  --text:#1a1a2e;
  --text2:#666;
  --red:#D32F2F;
  --orange:#F9A825;
  --green:#4CAF50;
  --blue:#1976D2;
  --radius:8px;
  --mono: ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1600px;margin:0 auto;padding:16px}
header{text-align:center;margin-bottom:16px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
header h1{font-size:20px;margin-bottom:6px}
header p{font-size:13px;color:var(--text2)}
header code{background:#f0f0f0;padding:2px 6px;border-radius:4px;font-size:12px;color:var(--red);font-family:var(--mono)}

/* 场景选择 */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.toolbar label{font-size:13px;color:var(--text2)}
#scenario{width:320px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:#fff;cursor:pointer}

/* 五栏网格 */
.pipeline{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:1200px){.pipeline{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.pipeline{grid-template-columns:1fr}}

.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px}
.panel-body{padding:12px;flex:1;overflow:auto;font-size:12px;font-family:var(--mono);line-height:1.5}
.panel-body pre{margin:0;white-space:pre-wrap;word-break:break-all}

/* YAML 高亮模拟 */
.yaml .key{color:var(--blue);font-weight:600}
.yaml .str{color:var(--red)}
.yaml .num{color:var(--orange)}
.yaml .comment{color:#999;font-style:italic}
.yaml .tag{color:var(--green);font-weight:600}

/* JSON 高亮 */
.json .key{color:var(--blue)}
.json .str{color:var(--red)}
.json .num{color:var(--orange)}
.json .bool{color:var(--green)}

/* 推演 */
.tier-item{display:flex;align-items:flex-start;padding:8px;border-radius:6px;border-left:3px solid #ddd;margin-bottom:6px;background:#fafafa}
.tier-item.pass{border-left-color:var(--green)}
.tier-item.block{border-left-color:var(--red)}
.tier-item.warn{border-left-color:var(--orange)}
.tier-item.skip{opacity:.5}
.tier-icon{width:20px;text-align:center;margin-right:6px;font-size:14px}
.tier-name{font-size:12px;font-weight:600}
.tier-desc{font-size:11px;color:var(--text2);margin-top:2px}

.verdict{text-align:center;padding:12px;border-radius:var(--radius);font-weight:700;font-size:14px;margin-top:8px}
.verdict.pass{background:#e8f5e9;color:var(--green);border:2px solid var(--green)}
.verdict.block{background:#ffebee;color:var(--red);border:2px solid var(--red)}

/* 告警卡片 */
.alert-card{border-radius:var(--radius);padding:16px;margin-top:8px;transition:.3s}
.alert-card.critical{background:#ffebee;border:2px solid var(--red);box-shadow:0 0 16px rgba(211,47,47,.15)}
.alert-card.warning{background:#fff8e1;border:2px solid var(--orange)}
.alert-card.normal{background:#e8f5e9;border:2px solid var(--green)}
.alert-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;color:#fff}
.badge.p0{background:var(--red)}
.badge.p1{background:var(--orange)}
.badge.severe{background:var(--orange);color:#333}
.pulse{width:10px;height:10px;border-radius:50%;background:var(--red);animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(211,47,47,.7)}70%{box-shadow:0 0 0 8px rgba(211,47,47,0)}100%{box-shadow:0 0 0 0 rgba(211,47,47,0)}}
.title{font-size:16px;font-weight:700;margin-bottom:6px}
.cause{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:6px}
.cbar{width:100%;height:5px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.cfill{height:100%;border-radius:3px}

/* 拦截遮罩 */
.overlay{position:absolute;inset:0;background:rgba(255,255,255,.96);display:flex;align-items:center;justify-content:center;border-radius:var(--radius);z-index:10}
.overlay.hidden{display:none}
.omodal{text-align:center;padding:24px;max-width:280px}
.omodal h3{color:var(--red);font-size:18px;margin-bottom:10px}
.omodal p{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.btn{background:var(--red);color:#fff;border:none;padding:8px 20px;border-radius:var(--radius);cursor:pointer;font-size:13px}
.btn:hover{background:#b71c1c}

.render-wrap{position:relative}

/* 箭头 */
.flow-arrow{text-align:center;padding:6px 0;font-size:20px;color:var(--text2)}
@media(min-width:1201px){
  .flow-arrow{display:none} /* 桌面端用网格间隙，不需要箭头 */
}

footer{text-align:center;padding:16px;color:var(--text2);font-size:12px}
footer a{color:var(--red);text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🔒 约束显化：从 YAML 协议到机器安检</h1>
    <p>展示 <code>intent-schema-compiler</code> 中意图协议如何被编译为 JSON Schema，并执行四层推演</p>
  </header>

  <div class="toolbar">
    <label>选择 LLM 输出场景：</label>
    <select id="scenario">
      <option value="valid">✅ 合法输出（P0 + 完整根因）</option>
      <option value="synonym">❌ 同义词漂移（"严重"替代 P0）</option>
      <option value="length">❌ 文案过短（根因 < 10 字符）</option>
      <option value="confidence">❌ 置信度越界（1.5 > 1.0）</option>
      <option value="safety">❌ 安全违规（建议自动修复）</option>
      <option value="multi">❌ 复合违规（3 条红线）</option>
    </select>
  </div>

  <div class="pipeline">
    <!-- 栏1：YAML 协议源文件 -->
    <div class="panel">
      <div class="panel-header">📄 YAML 协议源文件</div>
      <div class="panel-body yaml" id="yaml-panel"></div>
    </div>

    <!-- 栏2：编译产物 -->
    <div class="panel">
      <div class="panel-header">⚙️ 编译产物（JSON Schema）</div>
      <div class="panel-body json" id="schema-panel"></div>
    </div>

    <!-- 栏3：LLM 原始输出 -->
    <div class="panel">
      <div class="panel-header">🤖 LLM 原始输出</div>
      <div class="panel-body json" id="json-panel"></div>
    </div>

    <!-- 栏4：四层推演 -->
    <div class="panel">
      <div class="panel-header">🛡️ Four-Tier Validator</div>
      <div class="panel-body" id="tier-panel"></div>
      <div id="verdict-panel" style="padding:0 12px 12px"></div>
    </div>

    <!-- 栏5：界面渲染 -->
    <div class="panel">
      <div class="panel-header">🖥️ 用户界面渲染</div>
      <div class="panel-body render-wrap">
        <div id="alert-card"></div>
        <div id="block-overlay" class="overlay hidden">
          <div class="omodal">
            <h3>🚫 意图协议拦截</h3>
            <p id="block-reason"></p>
            <button class="btn" onclick="reset()">重置演示</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>
      控制平面：<a href="https://github.com/2436041978-ops/intent-schema-compiler" target="_blank">intent-schema-compiler</a> |
      在线演示：本页 |
      完整架构：<a href="https://github.com/2436041978-ops/schema-as-code" target="_blank">schema-as-code</a>
    </p>
  </footer>
</div>

<script>
const yamlSources = {
  valid: `semantic_tokens:
  <span class="tag">status.critical</span>:
    canonical_id: "ST-001"
    immutable: <span class="bool">true</span>
    llm_constraints:
      - "生成内容必须包含故障定位"
      - "<span class="str">禁止提供未经验证的修复建议</span>"
    synonym_firewall:
      prohibited:
        - term: "<span class="str">严重</span>"
          standard_token: "<span class="tag">critical</span>"

response_schema:
  required: [<span class="str">alert_level</span>, <span class="str">root_cause</span>, <span class="str">confidence_score</span>]
  properties:
    alert_level:
      enum: [<span class="str">"P0"</span>, <span class="str">"P1"</span>, <span class="str">"P2"</span>, <span class="str">"P3"</span>]
    root_cause:
      minLength: <span class="num">10</span>
    confidence_score:
      maximum: <span class="num">1.0</span>

human_ai_boundary:
  ai_prohibited:
    - "<span class="str">直接执行修复操作</span>"
    - "修改告警阈值配置"`,

  synonym: `semantic_tokens:
  <span class="tag">status.critical</span>:
    canonical_id: "ST-001"
    immutable: <span class="bool">true</span>
    llm_constraints:
      - "生成内容必须包含故障定位"
      - "<span class="str">禁止提供未经验证的修复建议</span>"
    synonym_firewall:
      prohibited:
        - term: "<span class="str" style="background:#ffebee">严重</span>"  <span class="comment">← 命中此项</span>
          standard_token: "<span class="tag">critical</span>"

response_schema:
  required: [<span class="str">alert_level</span>, <span class="str">root_cause</span>, <span class="str">confidence_score</span>]
  properties:
    alert_level:
      enum: [<span class="str">"P0"</span>, <span class="str">"P1"</span>, <span class="str">"P2"</span>, <span class="str">"P3"</span>]  <span class="comment">← "严重" 不在白名单</span>
    root_cause:
      minLength: <span class="num">10</span>
    confidence_score:
      maximum: <span class="num">1.0</span>

human_ai_boundary:
  ai_prohibited:
    - "<span class="str">直接执行修复操作</span>"
    - "修改告警阈值配置"`,

  length: `semantic_tokens:
  <span class="tag">status.critical</span>:
    canonical_id: "ST-001"
    immutable: <span class="bool">true</span>
    llm_constraints:
      - "生成内容必须包含故障定位"
      - "<span class="str">禁止提供未经验证的修复建议</span>"

response_schema:
  required: [<span class="str">alert_level</span>, <span class="str">root_cause</span>, <span class="str">confidence_score</span>]
  properties:
    alert_level:
      enum: [<span class="str">"P0"</span>, <span class="str">"P1"</span>, <span class="str">"P2"</span>, <span class="str">"P3"</span>]
    root_cause:
      minLength: <span class="num">10</span>  <span class="comment">← "CPU" 长度不足</span>
    confidence_score:
      maximum: <span class="num">1.0</span>

human_ai_boundary:
  ai_prohibited:
    - "<span class="str">直接执行修复操作</span>"
    - "修改告警阈值配置"`,

  confidence: `semantic_tokens:
  <span class="tag">status.critical</span>:
    canonical_id: "ST-001"
    immutable: <span class="bool">true</span>
    llm_constraints:
      - "生成内容必须包含故障定位"
      - "<span class="str">禁止提供未经验证的修复建议</span>"

response_schema:
  required: [<span class="str">alert_level</span>, <span class="str">root_cause</span>, <span class="str">confidence_score</span>]
  properties:
    alert_level:
      enum: [<span class="str">"P0"</span>, <span class="str">"P1"</span>, <span class="str">"P2"</span>, <span class="str">"P3"</span>]
    root_cause:
      minLength: <span class="num">10</span>
    confidence_score:
      maximum: <span class="num" style="background:#ffebee">1.0</span>  <span class="comment">← 1.5 越界</span>

human_ai_boundary:
  ai_prohibited:
    - "<span class="str">直接执行修复操作</span>"
    - "修改告警阈值配置"`,

  safety: `semantic_tokens:
  <span class="tag">status.critical</span>:
    canonical_id: "ST-001"
    immutable: <span class="bool">true</span>
    llm_constraints:
      - "生成内容必须包含故障定位"
      - "<span class="str">禁止提供未经验证的修复建议</span>"

response_schema:
  required: [<span class="str">alert_level</span>, <span class="str">root_cause</span>, <span class="str">confidence_score</span>]
  properties:
    alert_level:
      enum: [<span class="str">"P0"</span>, <span class="str">"P1"</span>, <span class="str">"P2"</span>, <span class="str">"P3"</span>]
    root_cause:
      minLength: <span class="num">10</span>
    confidence_score:
      maximum: <span class="num">1.0</span>

human_ai_boundary:
  ai_prohibited:
    - "<span class="str" style="background:#ffebee">直接执行修复操作</span>"  <span class="comment">← 命中此项</span>
    - "修改告警阈值配置"`,

  multi: `semantic_tokens:
  <span class="tag">status.critical</span>:
    canonical_id: "ST-001"
    immutable: <span class="bool">true</span>
    llm_constraints:
      - "生成内容必须包含故障定位"
      - "<span class="str">禁止提供未经验证的修复建议</span>"
    synonym_firewall:
      prohibited:
        - term: "<span class="str" style="background:#ffebee">严重</span>"  <span class="comment">← 命中</span>
          standard_token: "<span class="tag">critical</span>"

response_schema:
  required: [<span class="str">alert_level</span>, <span class="str">root_cause</span>, <span class="str">confidence_score</span>]
  properties:
    alert_level:
      enum: [<span class="str">"P0"</span>, <span class="str">"P1"</span>, <span class="str">"P2"</span>, <span class="str">"P3"</span>]  <span class="comment">← "严重" 越界</span>
    root_cause:
      minLength: <span class="num" style="background:#ffebee">10</span>  <span class="comment">← "CPU" 不足</span>
    confidence_score:
      maximum: <span class="num" style="background:#ffebee">1.0</span>  <span class="comment">← 1.5 越界</span>

human_ai_boundary:
  ai_prohibited:
    - "<span class="str">直接执行修复操作</span>"
    - "修改告警阈值配置"`
};

const schema = {
  type: "object",
  required: ["alert_level","root_cause","confidence_score"],
  properties: {
    alert_level:{type:"string",enum:["P0","P1","P2","P3"]},
    root_cause:{type:"string",minLength:10,maxLength:200},
    confidence_score:{type:"number",minimum:0,maximum:1},
    remediation:{type:"array",items:{type:"object",properties:{action_type:{enum:["manual","escalation"]}}}}
  }
};

const scenarios = {
  valid: {
    data:{alert_level:"P0",root_cause:"CPU 使用率超过阈值，导致服务响应延迟",confidence_score:0.85,remediation:[{action_type:"manual",description:"检查内存占用进程"}]},
    pass:true
  },
  synonym: {
    data:{alert_level:"严重",root_cause:"CPU 使用率超过阈值，导致服务响应延迟",confidence_score:0.85},
    pass:false,
    errors:[{tier:"semantic",name:"语义推演",msg:'Value "严重" is not defined in enum ["P0","P1","P2","P3"]',ref:"#/properties/alert_level/Enum"}]
  },
  length: {
    data:{alert_level:"P0",root_cause:"CPU",confidence_score:0.85},
    pass:false,
    errors:[{tier:"syntax",name:"语法推演",msg:"String 'CPU' is less than minimum length of 10",ref:"#/properties/root_cause/MinimumLength"}]
  },
  confidence: {
    data:{alert_level:"P0",root_cause:"CPU 使用率超过阈值，导致服务响应延迟",confidence_score:1.5},
    pass:false,
    errors:[{tier:"syntax",name:"语法推演",msg:"Float 1.5 exceeds maximum value of 1",ref:"#/properties/confidence_score/Maximum"}]
  },
  safety: {
    data:{alert_level:"P0",root_cause:"CPU 使用率超过阈值，导致服务响应延迟",confidence_score:0.85,remediation:[{action_type:"automated",description:"自动修复"}]},
    pass:false,
    errors:[{tier:"safety",name:"安全推演",msg:"AI 禁止建议自动执行。命中禁止模式: 'automated'",ref:"rules/safety/destructive.yaml"}]
  },
  multi: {
    data:{alert_level:"严重",root_cause:"CPU",confidence_score:1.5},
    pass:false,
    errors:[
      {tier:"semantic",name:"语义推演",msg:'Value "严重" is not defined in enum',ref:"#/properties/alert_level/Enum"},
      {tier:"syntax",name:"语法推演",msg:"String 'CPU' is less than minimum length of 10",ref:"#/properties/root_cause/MinimumLength"},
      {tier:"syntax",name:"语法推演",msg:"Float 1.5 exceeds maximum value of 1",ref:"#/properties/confidence_score/Maximum"}
    ]
  }
};

function escapeHtml(s){return s.replace(/[&<<>"']/g,c=>({'&':'&amp;','<<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function syntaxHighlightJson(obj){
  const json = JSON.stringify(obj,null,2);
  return escapeHtml(json)
    .replace(/"([^"]+)":/g,'<<span class="key">"$1"</span>:')
    .replace(/: "([^"]*)"/g,': <span class="str">"$1"</span>')
    .replace(/: (\d+\.?\d*)/g,': <span class="num">$1</span>')
    .replace(/: (true|false)/g,': <span class="bool">$1</span>');
}

function run(key){
  const sc = scenarios[key];
  const data = sc.data;

  // 栏1: YAML
  document.getElementById('yaml-panel').innerHTML = '<pre>' + yamlSources[key] + '</pre>';

  // 栏2: JSON Schema
  document.getElementById('schema-panel').innerHTML = '<pre>' + syntaxHighlightJson(schema) + '</pre>';

  // 栏3: LLM 输出
  document.getElementById('json-panel').innerHTML = '<pre>' + syntaxHighlightJson(data) + '</pre>';

  // 栏4: 推演
  const tiers = [];
  // T1 语法
  const t1Fail = sc.errors.some(e=>e.tier==="syntax");
  tiers.push({tier:"syntax",name:"语法推演",status:t1Fail?"block":"pass",detail:t1Fail?"结构或数值越界":"结构完整，字段类型正确"});

  // T2 语义
  const t2Fail = sc.errors.some(e=>e.tier==="semantic");
  if(t1Fail && !t2Fail){
    tiers.push({tier:"semantic",name:"语义推演",status:"skip",detail:"语法层阻断，短路终止"});
  }else{
    tiers.push({tier:"semantic",name:"语义推演",status:t2Fail?"block":"pass",detail:t2Fail?"语义令牌不在白名单":"语义令牌引用正确"});
  }

  // T3 安全
  const t3Fail = sc.errors.some(e=>e.tier==="safety");
  if((t1Fail||t2Fail) && !t3Fail){
    tiers.push({tier:"safety",name:"安全推演",status:"skip",detail:"前层阻断，短路终止"});
  }else{
    tiers.push({tier:"safety",name:"安全推演",status:t3Fail?"block":"pass",detail:t3Fail?"命中禁止模式":"无禁止模式命中"});
  }

  // T4 美感
  const t4Warn = data.root_cause && data.root_cause.length>150;
  tiers.push({tier:"aesthetic",name:"美感推演",status:t4Warn?"warn":"pass",detail:t4Warn?"文案长度超过建议":"信息密度与可读性达标"});

  document.getElementById('tier-panel').innerHTML = tiers.map(t=>{
    const icon = t.status==="pass"?"✅":t.status==="block"?"❌":t.status==="warn"?"⚠️":"⏸️";
    return `<div class="tier-item ${t.status}">
      <div class="tier-icon">${icon}</div>
      <div>
        <div class="tier-name">${t.name} [${t.status.toUpperCase()}]</div>
        <div class="tier-desc">${t.detail}</div>
      </div>
    </div>`;
  }).join('');

  const verdict = document.getElementById('verdict-panel');
  if(sc.pass){
    verdict.className="verdict pass";
    verdict.textContent="✅ PASS — 四层推演通过，允许渲染";
  }else{
    verdict.className="verdict block";
    verdict.textContent="❌ BLOCK — 推演失败，强制拦截并升级人工";
  }

  // 栏5: 渲染
  const level = data.alert_level;
  const isValid = ["P0","P1","P2","P3"].includes(level);
  const cardClass = isValid && level==="P0"?"critical":isValid?"warning":"normal";
  const badgeClass = isValid?level.toLowerCase():"severe";
  const badgeText = isValid?level:"UNKNOWN";
  const cp = Math.min(Math.max((data.confidence_score||0)*100,0),100);
  const cfClass = cp>80?"high":cp>50?"medium":"low";

  document.getElementById('alert-card').className='alert-card '+cardClass;
  document.getElementById('alert-card').innerHTML=`
    <div class="alert-header">
      <span class="badge ${badgeClass}">${badgeText}</span>
      ${isValid&&level==="P0"?'<span class="pulse"></span>':''}
    </div>
    <div class="title">系统告警</div>
    <div class="cause">${data.root_cause||'未提供根因'}</div>
    <div class="meta"><span>置信度: ${data.confidence_score!==undefined?data.confidence_score:'N/A'}</span><span>${sc.pass?'✓ 合规':'⚠️ 存在违规'}</span></div>
    <div class="cbar"><div class="cfill ${cfClass}" style="width:${cp}%"></div></div>
    ${data.remediation&&data.remediation.length?`<div style="margin-top:10px;font-size:12px;padding:8px;background:#f5f5f5;border-radius:4px;">${data.remediation.map(r=>`<span style="color:${r.action_type==='automated'?'var(--red)':'var(--green)'}">${r.action_type==='automated'?'⚠️ ':'✓ '}${r.description}</span>`).join('<br>')}</div>`:''}
  `;

  // 拦截遮罩
  if(!sc.pass){
    const first = sc.errors[0];
    document.getElementById('block-overlay').classList.remove('hidden');
    document.getElementById('block-reason').innerHTML=
      `<strong>违规层级：</strong>Four-Tier ${first.tier.toUpperCase()}<<br>
       <strong>规则编号：</strong>${first.ref||'N/A'}<<br>
       <strong>拦截原因：</strong>${first.msg}<br><br>
       <small>阻断优于修正：不触发 LLM 自动重试，直接升级人工</small>`;
  }else{
    document.getElementById('block-overlay').classList.add('hidden');
  }
}

function reset(){
  document.getElementById('scenario').value='valid';
  run('valid');
}

document.getElementById('scenario').addEventListener('change',e=>run(e.target.value));
run('valid');
</script>
</body>
</html>
