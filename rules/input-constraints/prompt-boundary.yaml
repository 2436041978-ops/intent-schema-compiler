# =============================================================================
# Intent-Schema-Compiler :: Input Constraints — Prompt Boundary Definition
# =============================================================================
# Purpose    : Define the boundary conditions for prompts fed into the LLM.
# Version    : 1.0.0
# Maintained : intent-schema-compiler/rules/input-constraints/
# =============================================================================

$schema: "https://intent-schema.io/v1/input-constraints.yaml"
doc_id: "ISC-IC-PB-001"
version: "1.0.0"
last_updated: "2025-01-20"

# =========================================================================
# SECTION 1: PROMPT STRUCTURE CONSTRAINTS
# =========================================================================
# 定义 Prompt 的结构格式规则 —— token 预算、必要章节、上下文注入方式。
# 这些约束是可随场景覆盖的「结构配置」，不是安全红线。
# =========================================================================
structure_constraints:
  description: |
    Hard constraints applied to every prompt before it is dispatched to the LLM.
    Violations at this level trigger an immediate pre-flight rejection.
  description: |
    Hard constraints applied to every prompt before it is dispatched to the LLM.
    Violations at this level trigger an immediate pre-flight rejection.

  max_tokens:
    default: 8192
    hard_limit: 16384
    tokenizer: "cl100k_base"
    truncation_strategy: "tail_priority"
    # token_budget breakdown (percentage of max_tokens)
    budget_allocation:
      system_instructions: 0.15      # ~1228 tokens — role, constraints, safety
      schema_reference:    0.20      # ~1638 tokens — injected schema definitions
      user_context:        0.30      # ~2457 tokens — user query + session history
      semantic_tokens:     0.25      # ~2048 tokens — intent tags, entity markers
      output_reserve:      0.10      # ~ 819 tokens — reserved for response headroom

  required_sections:
    - section: "system_preamble"
      description: "Role definition and system-level constraints"
      min_lines: 3
      required_tokens:
        - "ROLE"
        - "CONSTRAINT"
      enforce_order: true
      position: "head"

    - section: "schema_anchor"
      description: "Injected schema reference block"
      min_lines: 1
      required_tokens:
        - "SCHEMA_REF"
        - "VERSION"
      enforce_order: true
      position: "after_preamble"

    - section: "user_intent"
      description: "Natural-language query and intent payload"
      min_lines: 1
      required_tokens:
        - "QUERY"
      enforce_order: true
      position: "after_schema"

    - section: "safety_footer"
      description: "Safety reminder and output-format restatement"
      min_lines: 1
      required_tokens:
        - "SAFETY_CHECK"
        - "OUTPUT_FORMAT"
      enforce_order: true
      position: "tail"

  forbidden_patterns:
    - pattern: "(?i)(password|passwd|pwd)\\s*[:=]\\s*\\S+"
      category: "credential_exposure"
      severity: "critical"
      action: "block"
      reason: "Raw credential strings must never appear in prompts"

    - pattern: "(?i)(api[_-]?key|token|secret)\\s*[:=]\\s*[\"']?[a-zA-Z0-9_-]{16,}[\"']?"
      category: "secret_exposure"
      severity: "critical"
      action: "block"
      reason: "API keys and secrets must be tokenized or redacted"

    - pattern: "<\\s*script[^>]*>"
      category: "xss_injection"
      severity: "high"
      action: "sanitize"
      reason: "HTML/JS tags are not allowed in prompt payloads"

    - pattern: "(?i)(ignore|disregard|forget).{0,30}(previous|above|system).{0,30}(instruction|prompt)"
      category: "prompt_injection"
      severity: "critical"
      action: "block"
      reason: "Known prompt-injection pattern detected"

    - pattern: "\\\\x[0-9a-fA-F]{2}"
      category: "obfuscation"
      severity: "high"
      action: "sanitize"
      reason: "Hex-encoded characters may indicate obfuscation attacks"

    - pattern: '\\$\\{.*\\}|\`.*\`|eval\\s*\\('
      category: "code_injection"
      severity: "high"
      action: "block"
      reason: "Template injection and eval-like constructs forbidden"

# =========================================================================
# END OF SECTION 1 — Prompt Structure Constraints
# =========================================================================

# =========================================================================
# SECTION 2: SAFETY GUARDRAILS (IMMUTABLE)
# =========================================================================
# ⚠️ 安全红线 —— 这些是输入层面的负向约束（禁止什么），不是可配置项。
# 任何 scenario 不得覆盖或禁用此分区的规则。
# =========================================================================
safety_guardrails:
  description: |
    ⚠️ IMMUTABLE SECURITY BOUNDARIES — These rules are security red-lines,
    NOT configurable per scenario.  They are enforced on ALL prompts regardless
    of scenario overrides in Section 1.

    Multi-layer input safety checks applied before prompt dispatch.
    Layers: (1) Static pattern filter, (2) Heuristic scanner, (3) ML-based detector.

  input_filter:
    - layer: "static_pattern_filter"
      enabled: true
      stage: "pre_tokenization"
      rules_source: "structure_constraints.forbidden_patterns"
      action_on_hit: "block_and_audit"
      log_level: "warn"

    - layer: "heuristic_scanner"
      enabled: true
      stage: "post_tokenization"
      checks:
        - name: "entropy_spike"
          description: "Detect high-entropy segments suggesting encoded data"
          threshold: 4.5
          window_size: 32
        - name: "repetition_anomaly"
          description: "Detect pathological repetition patterns"
          max_repetition_ratio: 0.70
        - name: "length_anomaly"
          description: "Flag prompts deviating significantly from expected length"
          max_zscore: 3.0
      action_on_hit: "quarantine_for_review"
      log_level: "info"

    - layer: "ml_sensitive_detector"
      enabled: true
      stage: "post_tokenization"
      model: "piidetector-v2"
      confidence_threshold: 0.85
      entity_types:
        - person_name
        - email_address
        - phone_number
        - ssn
        - credit_card
        - ip_address
      action_on_hit: "redact_and_warn"
      log_level: "error"

  sensitive_info_detection:
    pii_redaction:
      enabled: true
      strategy: "entity_type_label"
      # e.g. "john.doe@example.com" -> "<EMAIL_ADDRESS>"
      redaction_format: "<{entity_type}>"
      preserve_structure: true
      audit_original: false    # Never log original PII

    secret_detection:
      enabled: true
      providers:
        - provider: "gitleaks"
          config_profile: "default"
        - provider: "custom_regex"
          rules_source: "structure_constraints.forbidden_patterns"
      detection_mode: "scan_entire_prompt"
      action: "block_and_alert"

    topic_restrictions:
      forbidden_topics:
        - "malware_generation"
        - "exploit_development"
        - "social_engineering_attacks"
        - "credit_card_fraud"
      action: "block"
      response_message: "Request blocked by content policy."

# =========================================================================
# END OF SECTION 2 — Safety Guardrails (Immutable)
# =========================================================================

# ---------------------------------------------------------------------------
# 3. CONTEXT INJECTION — Semantic token & schema reference handling
# ---------------------------------------------------------------------------
context_injection:
  description: |
    Rules governing how semantic tokens and schema references are woven into
    the prompt.  Ensures structural integrity and traceability.

  semantic_tokens:
    injection_position: "pre_user_query"
    delimiter:
      open:  "<<<SEMANTIC_CONTEXT>>>"
      close: "<<<END_SEMANTIC_CONTEXT>>>"
    encoding: "json"
    compress_nested: true
    max_nesting_depth: 5
    supported_token_types:
      - intent_tag           # e.g. "intent:alert_generation"
      - entity_marker        # e.g. "entity:service_name=payment-gateway"
      - confidence_score     # e.g. "confidence:0.94"
      - slot_value           # e.g. "slot:severity=critical"
      - trace_id             # e.g. "trace:abc-123-def"
    injection_template: |
      {{delimiter.open}}
      {
        "injected_at": "{{timestamp}}",
        "tokens": {{semantic_tokens_json}},
        "schema_version": "{{schema.version}}"
      }
      {{delimiter.close}}

  schema_reference:
    reference_mode: "inline_embedded"
    # alternative modes: "uri_dereference", "cached_handle"
    schema_anchor_tag: "SCHEMA_REF"
    embedding_format: "yaml"
    max_embedded_schema_lines: 200
    # When schema exceeds max_embedded_schema_lines, switch to handle mode
    overflow_strategy: "switch_to_handle"
    handle_template: "SCHEMA_REF: handle://{{schema.namespace}}/{{schema.name}}@{{schema.version}}"
    # Schema fields eligible for embedding (whitelist)
    embeddable_fields:
      - type
      - properties
      - required
      - enum
      - pattern
      - description
    # Fields that must be stripped before embedding (security)
    redacted_fields:
      - examples         # May contain PII in illustrative data
      - default          # May leak internal configuration

# ---------------------------------------------------------------------------
# 4. SCENARIO-SPECIFIC BOUNDARY CONFIGURATIONS
# ---------------------------------------------------------------------------
# Each scenario may override or extend the global boundary settings above.
# ---------------------------------------------------------------------------
scenarios:

  # --- Scenario A: Alert Generation ----------------------------------------
  alert_generation:
    description: "Generate a structured alert card from monitoring event data"

    structure_constraints:
      max_tokens:
        override_default: 6144
        budget_allocation:
          system_instructions: 0.12
          schema_reference:    0.25
          user_context:        0.33
          semantic_tokens:     0.22
          output_reserve:      0.08

      required_sections:
        - section: "system_preamble"
          position: "head"
          required_tokens: ["ROLE:alert_engineer", "CONSTRAINT:strict_schema"]

        - section: "schema_anchor"
          position: "after_preamble"
          required_tokens: ["SCHEMA_REF:alert_card@v2"]

        - section: "event_context"
          position: "after_schema"
          description: "Raw event data (logs, metrics, traces)"
          required_tokens: ["EVENT_DATA", "SOURCE_SYSTEM"]

        - section: "semantic_annotations"
          position: "after_event"
          description: "Pre-extracted intent tags and entity markers"
          required_tokens: ["INTENT_TAGS", "ENTITY_MARKERS"]

        - section: "user_intent"
          position: "after_annotations"
          required_tokens: ["QUERY"]

        - section: "safety_footer"
          position: "tail"
          required_tokens: ["SAFETY_CHECK", "OUTPUT_FORMAT:alert_card"]

      forbidden_patterns:
        # Inherit all global forbidden_patterns automatically
        additional:
          - pattern: "(?i)(production|prod).{0,10}(shutdown|kill|destroy)\\b"
            category: "destructive_action"
            severity: "critical"
            action: "block"
            reason: "Destructive action keywords in alert context not allowed"

    context_injection:
      semantic_tokens:
        injection_position: "after_event_context"
        required_token_types:
          - intent_tag: "alert_generation"
          - entity_marker: "source_system"
          - entity_marker: "service_name"
          - entity_marker: "severity_level"
          - slot_value: "time_window"
        optional_token_types:
          - confidence_score
          - trace_id

      schema_reference:
        schema_anchor_tag: "SCHEMA_REF:alert_card@v2"
        embedded_schema_source: "schemas/alert-card-v2.yaml"

    safety_guardrails:
      sensitive_info_detection:
        secret_detection:
          extended_checks:
            - pattern: "(?i)database[_-]?connection[_-]?string"
              category: "connection_string_exposure"
              severity: "critical"
              action: "block"

    # Example prompt layout for alert_generation
    prompt_layout_template: |
      [SYSTEM_PREAMBLE]
      You are an Alert Engineer.  You MUST emit strictly valid JSON conforming
      to SCHEMA_REF:alert_card@v2.  Do not include prose outside the JSON.

      [SCHEMA_ANCHOR]
      <<<SCHEMA_REF:alert_card@v2>>>

      [EVENT_CONTEXT]
      Source: {{event.source_system}}
      Raw event: {{event.payload_json}}

      [SEMANTIC_ANNOTATIONS]
      <<<SEMANTIC_CONTEXT>>>
      {"intent":"alert_generation","entities":{{event.entities}}}
      <<<END_SEMANTIC_CONTEXT>>>

      [USER_INTENT]
      {{user.query}}

      [SAFETY_FOOTER]
      SAFETY_CHECK: active | OUTPUT_FORMAT: alert_card JSON only

  # --- Scenario B: Incident Summary ----------------------------------------
  incident_summary:
    description: "Synthesize a multi-source incident summary from tickets, logs, and chat"

    structure_constraints:
      max_tokens:
        override_default: 12288
        hard_limit: 16384
        truncation_strategy: "middle_priority"
        # For long incidents, preserve beginning (context) and end (latest updates)
        budget_allocation:
          system_instructions: 0.08
          schema_reference:    0.15
          user_context:        0.45
          semantic_tokens:     0.20
          output_reserve:      0.12

      required_sections:
        - section: "system_preamble"
          position: "head"
          required_tokens: ["ROLE:incident_analyst", "CONSTRAINT:neutral_tone"]

        - section: "schema_anchor"
          position: "after_preamble"
          required_tokens: ["SCHEMA_REF:incident_summary@v1"]

        - section: "incident_context"
          position: "after_schema"
          description: "Incident metadata (ID, severity, timeline, affected services)"
          required_tokens: ["INCIDENT_ID", "SEVERITY", "TIMELINE"]

        - section: "evidence_collage"
          position: "after_incident"
          description: "Aggregated evidence from tickets, logs, metrics, chat transcripts"
          required_tokens: ["EVIDENCE_SOURCE", "EVIDENCE_DATA"]

        - section: "user_intent"
          position: "after_evidence"
          required_tokens: ["QUERY", "SUMMARY_DEPTH"]

        - section: "safety_footer"
          position: "tail"
          required_tokens: ["SAFETY_CHECK", "OUTPUT_FORMAT:incident_summary"]

      forbidden_patterns:
        additional:
          - pattern: "(?i)blame\\s+\\w+"
            category: "blame_language"
            severity: "medium"
            action: "sanitize"
            reason: "Incident summaries must remain blameless"
          - pattern: "(?i) incompetent | stupid | idiot "
            category: "toxic_language"
            severity: "high"
            action: "sanitize"
            reason: "Toxic language has no place in incident documentation"

    context_injection:
      semantic_tokens:
        injection_position: "after_incident_context"
        required_token_types:
          - intent_tag: "incident_summary"
          - entity_marker: "incident_id"
          - entity_marker: "affected_services"
          - entity_marker: "severity_level"
          - slot_value: "summary_depth"
          - slot_value: "time_range"
        optional_token_types:
          - confidence_score
          - trace_id

      schema_reference:
        schema_anchor_tag: "SCHEMA_REF:incident_summary@v1"
        embedded_schema_source: "schemas/incident-summary-v1.yaml"

    safety_guardrails:
      sensitive_info_detection:
        pii_redaction:
          redaction_format: "[{entity_type}:REDACTED]"
          extended_entity_types:
            - employee_id
            - internal_hostname

    # Example prompt layout for incident_summary
    prompt_layout_template: |
      [SYSTEM_PREAMBLE]
      You are an Incident Analyst.  Produce a concise, blameless summary.
      SCHEMA_REF:incident_summary@v1  |  CONSTRAINT:neutral_tone

      [SCHEMA_ANCHOR]
      <<<SCHEMA_REF:incident_summary@v1>>>

      [INCIDENT_CONTEXT]
      ID: {{incident.id}} | Severity: {{incident.severity}}
      Timeline: {{incident.timeline_json}}

      [SEMANTIC_ANNOTATIONS]
      <<<SEMANTIC_CONTEXT>>>
      {"intent":"incident_summary","entities":{{incident.entities}}}
      <<<END_SEMANTIC_CONTEXT>>>

      [EVIDENCE_COLLAGE]
      {{#each evidence}}
      --- {{source}} ---
      {{content}}
      {{/each}}

      [USER_INTENT]
      {{user.query}} | Depth: {{user.summary_depth}}

      [SAFETY_FOOTER]
      SAFETY_CHECK: active | OUTPUT_FORMAT: incident_summary JSON only

# ---------------------------------------------------------------------------
# 5. OVERRIDE POLICY
# ---------------------------------------------------------------------------
# Scenario-level values shallow-merge with global values.
# Lists under `required_sections` and `forbidden_patterns` are REPLACED,
# not appended, unless annotated with "extend: true".
# ---------------------------------------------------------------------------
override_policy:
  merge_strategy: "shallow_replace"
  list_behavior: "replace"
  allow_list_extension: true
  extension_annotation: "extend: true"
